    /* ── PDF.js inline renderer ── */
    .pdf-viewer {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding-bottom: 3rem;
    }
  
    .pdf-page-canvas {
      display: block;
      width: 100%;
      max-width: 780px;
      height: auto;
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
      border-radius: 2px;
      background: #fff;

    .pdf-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 4rem 2rem;
      color: var(--muted);
      text-align: center;
      width: 100%;
    }
  
    .pdf-loading .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(192,132,252,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
  
    .pdf-loading p {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  
    .pdf-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      padding: 3rem 2rem;
      color: var(--muted);
      text-align: center;
      width: 100%;
    }
  
    .pdf-error svg { opacity: 0.3; }
  
    .pdf-error p { font-size: 0.8rem; letter-spacing: 1px; }
    .pdf-error .fname { font-family: monospace; color: var(--accent); font-size: 0.75rem; }
  
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

window.addEventListener("load", async function () {

  const container = document.getElementById("terminos-viewer");
  const pdfURL = "./OMDUARA_Terminos_y_Condiciones.pdf"; // relative-safe path

  try {
    console.log("Loading PDF from:", pdfURL);

    const loadingTask = pdfjsLib.getDocument({
      url: pdfURL,
      withCredentials: false
    });

    const pdf = await loadingTask.promise;

    container.innerHTML = "";

    const scale = 1.8;

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale });

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.className = "pdf-page-canvas";

      container.appendChild(canvas);

      await page.render({
        canvasContext: context,
        viewport: viewport
      }).promise;
    }

  } catch (error) {
    console.error("PDF failed to load:", error);

    container.innerHTML = `
      <div class="pdf-error">
        <p>No se pudo cargar el archivo.</p>
        <p class="fname">${pdfURL}</p>
      </div>
    `;
  }
});
</script>
