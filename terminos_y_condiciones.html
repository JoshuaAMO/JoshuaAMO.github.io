<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(async function () {

  const container = document.getElementById("terminos-viewer");
  if (!container) return;

  container.innerHTML = `
    <div class="pdf-loading">
      <div class="spinner"></div>
      <p>Cargando</p>
    </div>`;

  try {

    // 🚀 Disable worker completely (most stable for standalone pages)
    const loadingTask = pdfjsLib.getDocument({
      url: "OMDUARA_Terminos_y_Condiciones.pdf",
      disableWorker: true
    });

    const pdf = await loadingTask.promise;

    container.innerHTML = "";

    const scale = 1.8;

    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {

      const page = await pdf.getPage(pageNum);
      const viewport = page.getViewport({ scale });

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.className = "pdf-page-canvas";

      container.appendChild(canvas);

      await page.render({
        canvasContext: context,
        viewport: viewport
      }).promise;
    }

  } catch (error) {

    container.innerHTML = `
      <div class="pdf-error">
        <p>No se pudo cargar el archivo.</p>
        <p class="fname">OMDUARA_Terminos_y_Condiciones.pdf</p>
      </div>`;

  }

})();
</script>

</body>
